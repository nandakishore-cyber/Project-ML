<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - DynPrice</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/cart.css">
</head>
<body class="page-cart page-offset">

  <!-- Navbar Component -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-brand">DynPrice</a>
      
      <ul class="navbar-nav desktop-only">
        <li><a href="products.html" class="nav-link">All Products</a></li>
        <li><a href="products.html?category=Laptops" class="nav-link">Laptops</a></li>
        <li><a href="products.html?category=Phones" class="nav-link">Phones</a></li>
      </ul>

      <div class="navbar-actions">
        <a href="orders.html" id="nav-user-btn" class="navbar-icon-btn">👤</a>
        <a href="cart.html" class="navbar-icon-btn" style="color:var(--color-primary);">
          🛒
          <span class="cart-badge" id="cart-badge-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 32px;">
    
    <h1 class="page-title" style="margin-bottom: 24px;">My Cart</h1>

    <div class="cart-tabs" style="display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px;">
      <div class="cart-tab active" style="flex: 1; text-align: center; padding: 12px; color: #a5b4fc; font-weight: 700; border-bottom: 3px solid #8b5cf6; cursor: pointer;">
        DynPrice Cart (<span id="tab-count">0</span>)
      </div>
      <div class="cart-tab" style="flex: 1; text-align: center; padding: 12px; font-weight: 600; color: #64748b; cursor: pointer;">
        Saved Items (0)
      </div>
    </div>

    <div class="delivery-box" style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08);">
      <div style="font-size: 14px; color: #cbd5e1;">Deliver to: <span style="font-weight: 700; color: #f8fafc;">Coimbatore - 641031</span></div>
      <button class="btn btn-outline" style="padding: 6px 14px; font-size: 13px;">Change</button>
    </div>

    <div id="cart-loading">
      <div style="text-align: center; padding: 60px 0;">
        <span class="spinner spinner-large"></span>
        <p class="mt-4 text-muted">Fetching live prices...</p>
      </div>
    </div>

    <div id="cart-empty" style="display: none;">
      <div class="empty-state">
        <h3 style="margin-bottom: 8px;">Your cart is empty</h3>
        <p style="margin-bottom: 24px;">Looks like you haven't added anything to your cart yet.</p>
        <a href="products.html" class="btn btn-primary" style="background: #2874f0; color: white;">Start Shopping</a>
      </div>
    </div>

    <!-- Will be shown if items exist -->
    <div class="cart-layout" id="cart-content" style="display: none;">
      
      <div class="cart-main" style="width: 100%;">
        <div class="cart-items-list" id="cart-items-list">
          <!-- Populated by JS -->
        </div>
        
        <div class="cart-savings-banner" id="cart-savings-banner" style="display:none;">
          % You'll save ₹<span id="savings-amount">0</span> on this order!
        </div>
      </div>
    </div>

    <!-- Sticky Footer -->
    <div class="cart-sticky-footer" id="cart-sticky-footer" style="display: none;">
      <div class="footer-price-info">
        <div class="footer-total-label">Total to Pay</div>
        <div id="sticky-new-total">₹0</div>
      </div>
      <button class="btn btn-checkout" onclick="window.location.href='checkout.html'">
        Proceed to Checkout
      </button>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initCartPage();
    });
  </script>
</body>
</html>
