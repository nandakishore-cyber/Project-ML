<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - DynPrice</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/checkout.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="pt-navbar" style="background-color: var(--bg-page);">

  <nav class="navbar">
    <div class="container">
      <div class="nav-brand"><a href="index.html">DynPrice</a></div>
      <div class="nav-links">
        <a href="products.html">All Products</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="cart-icon-wrapper text-muted">
          🛒
          <span class="cart-badge" id="nav-cart-badge">0</span>
        </a>
        <div id="nav-user-profile" style="display: flex; align-items: center; gap: 12px;">
          <span class="user-name fw-medium" style="color: var(--color-navy);">User</span>
          <button class="btn-logout text-danger fs-small fw-medium" title="Logout">↩</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 32px; min-height: 70vh;">
    <div class="breadcrumb" style="margin-top:0;">
      <a href="cart.html">Cart</a> / <span class="active">Checkout</span>
    </div>
    
    <h1 style="font-size: 28px; margin-bottom: 24px;">Checkout</h1>

    <div class="checkout-layout">
      <!-- Form Area -->
      <section class="checkout-form-section">
        <form id="checkout-form">
          <div class="checkout-card">
            <h2 class="checkout-card-title">Contact Information</h2>
            <div class="form-grid">
              <div class="form-group full-width">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="co-email" required>
              </div>
              <div class="form-group full-width">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="co-phone" required>
              </div>
            </div>
          </div>

          <div class="checkout-card">
            <h2 class="checkout-card-title">Shipping Address</h2>
            <div class="form-grid">
              <div class="form-group full-width">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="co-name" required>
              </div>
              <div class="form-group full-width">
                <label class="form-label">Street Address</label>
                <input type="text" class="form-control" id="co-address" required placeholder="House number and street name">
              </div>
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" class="form-control" id="co-city" required>
              </div>
              <div class="form-group">
                <label class="form-label">State</label>
                <input type="text" class="form-control" id="co-state" required>
              </div>
              <div class="form-group">
                <label class="form-label">PIN Code</label>
                <input type="text" class="form-control" id="co-pin" required>
              </div>
            </div>
          </div>
          
          <div style="text-align: right; margin-bottom: 24px;">
            <button type="submit" class="btn btn-primary" id="btn-submit-order" style="padding: 14px 32px;">
              <span id="btn-pay-text">Pay Now</span>
            </button>
          </div>
        </form>
      </section>

      <!-- Summary Area -->
      <aside class="checkout-summary">
        <div style="font-size: 18px; font-weight: 700; color: var(--color-navy); margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border);">
          Order Summary
        </div>
        
        <div id="checkout-items-preview" style="margin-bottom: 24px;">
          <!-- items fetched by js -->
        </div>

        <div style="border-top: 1px solid var(--color-border); padding-top: 16px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;">
            <span class="text-muted">Subtotal</span>
            <span class="text-navy fw-medium" id="co-subtotal">₹0</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;">
            <span class="text-muted">Shipping</span>
            <span class="text-navy fw-medium" id="co-shipping">₹0</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin-top:16px; font-size:18px; font-weight:700;">
            <span class="text-navy">Total</span>
            <span class="text-navy" id="co-total">₹0</span>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
  <script>
    // Prefill form if user exists
    const usr = getUser();
    if(usr) {
       const emEl = document.getElementById('co-email');
       const nmEl = document.getElementById('co-name');
       if(emEl && usr.email) emEl.value = usr.email;
       if(nmEl && usr.name) nmEl.value = usr.name;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - DynPrice</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/checkout.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="page-offset">

  <!-- Navbar Component -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-brand">DynPrice</a>
      
      <ul class="navbar-nav desktop-only">
        <li><a href="products.html" class="nav-link">All Products</a></li>
      </ul>

      <div class="navbar-actions">
        <a href="orders.html" id="nav-user-btn" class="navbar-icon-btn">👤</a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 32px;">
    <h1 class="page-title" style="margin-bottom: 24px; font-size:28px; color:var(--color-navy);">Checkout</h1>

    <div class="checkout-layout">
      
      <div class="checkout-form-container">
        <h2>Delivery Address</h2>
        <form id="checkout-form" onsubmit="event.preventDefault(); handlePayment();">
          <div class="form-group">
            <label class="form-label" for="addr-name">Full Name</label>
            <input type="text" id="addr-name" class="form-input" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="addr-street">Street Address</label>
            <input type="text" id="addr-street" class="form-input" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="addr-city">City</label>
              <input type="text" id="addr-city" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="addr-state">State</label>
              <input type="text" id="addr-state" class="form-input" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="addr-zip">Postal Code</label>
              <input type="text" id="addr-zip" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="addr-phone">Phone Number</label>
              <input type="tel" id="addr-phone" class="form-input" required>
            </div>
          </div>

          <button id="hidden-submit" type="submit" style="display:none;"></button>
        </form>
      </div>

      <aside class="checkout-summary">
        <h3>Order Summary</h3>
        
        <div class="summary-items-list" id="checkout-items">
          <!-- Populated by JS -->
          <div style="text-align:center; padding: 20px;"><span class="spinner"></span></div>
        </div>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="chk-subtotal">₹0</span>
        </div>
        <div class="summary-row">
           <span>Tax (5%)</span>
           <span id="chk-tax">₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total To Pay</span>
          <span id="chk-total">₹0</span>
        </div>

        <div class="payment-section">
          <button class="btn btn-razorpay" id="btn-pay" onclick="document.getElementById('hidden-submit').click();">
            Pay with Razorpay
          </button>
        </div>
      </aside>

    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initCheckoutPage();
    });
  </script>
</body>
</html>
