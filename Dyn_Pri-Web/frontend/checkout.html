

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - DynPrice</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/checkout.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="page-checkout page-offset">

  <!-- Navbar Component -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-brand">DynPrice</a>
      
      <ul class="navbar-nav desktop-only">
        <li><a href="products.html" class="nav-link">All Products</a></li>
      </ul>

      <div class="navbar-actions">
        <a href="orders.html" id="nav-user-btn" class="navbar-icon-btn">👤</a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 32px;">
    <h1 class="page-title" style="margin-bottom: 24px; font-size:28px; color:var(--color-navy);">Checkout</h1>

    <div class="checkout-layout">
      
      <div class="checkout-form-container">
        <h2>Delivery Address</h2>
        <form id="checkout-form" onsubmit="event.preventDefault(); handlePayment();">
          <div class="form-group">
            <label class="form-label" for="addr-name">Full Name</label>
            <input type="text" id="addr-name" class="form-input" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="addr-street">Street Address</label>
            <input type="text" id="addr-street" class="form-input" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="addr-city">City</label>
              <input type="text" id="addr-city" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="addr-state">State</label>
              <input type="text" id="addr-state" class="form-input" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="addr-zip">Postal Code</label>
              <input type="text" id="addr-zip" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="addr-phone">Phone Number</label>
              <input type="tel" id="addr-phone" class="form-input" required>
            </div>
          </div>

          <button id="hidden-submit" type="submit" style="display:none;"></button>
        </form>
      </div>

      <aside class="checkout-summary">
        <h3>Order Summary</h3>
        
        <div class="summary-items-list" id="checkout-items">
          <!-- Populated by JS -->
          <div style="text-align:center; padding: 20px;"><span class="spinner"></span></div>
        </div>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="chk-subtotal">₹0</span>
        </div>
        <div class="summary-row">
           <span>Tax (5%)</span>
           <span id="chk-tax">₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total To Pay</span>
          <span id="chk-total">₹0</span>
        </div>

        <div class="payment-section">
          <button class="btn btn-razorpay" id="btn-pay" onclick="document.getElementById('hidden-submit').click();">
            Pay with Razorpay
          </button>
        </div>
      </aside>

    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initCheckoutPage();
    });
  </script>
</body>
</html>
