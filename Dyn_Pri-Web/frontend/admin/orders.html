<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Orders - DynPrice</title>
  
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body class="page-offset">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="../index.html" class="navbar-brand">DynPrice <span style="font-size:12px; color:var(--color-danger); vertical-align:middle; margin-left:8px;">ADMIN</span></a>
      <div class="navbar-actions">
        <button class="btn btn-outline" style="padding: 4px 12px; font-size:12px;" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <ul class="admin-nav">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="products.html" class="nav-link">Products</a></li>
        <li><a href="orders.html" class="nav-link active">Orders</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <h1 class="page-title" style="margin-bottom: 24px; font-size:28px; color:var(--color-navy);">Manage Orders</h1>

      <div class="panel">
        <div class="data-table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-orders-table">
              <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/orders.js"></script>
  <script>
    requireAdmin();
    document.addEventListener('DOMContentLoaded', () => {
      initAdminOrders();
    });
  </script>
</body>
</html>
