<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DynPrice - Smart Dynamic Pricing</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>
<body class="page-offset">

  <!-- Navbar Component -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-brand">DynPrice</a>
      
      <ul class="navbar-nav desktop-only">
        <li><a href="products.html" class="nav-link">All Products</a></li>
        <li><a href="products.html?category=Laptops" class="nav-link">Laptops</a></li>
        <li><a href="products.html?category=Phones" class="nav-link">Phones</a></li>
      </ul>

      <div class="navbar-actions">
        <!-- Search icon (placeholder) -->
        <button class="navbar-icon-btn">
          🔍
        </button>
        <!-- User icon -->
        <a href="orders.html" id="nav-user-btn" class="navbar-icon-btn">
          👤
        </a>
        <!-- Cart info -->
        <a href="cart.html" class="navbar-icon-btn">
          🛒
          <span class="cart-badge" id="cart-badge-count">0</span>
        </a>
        <button id="nav-logout-btn" class="btn btn-outline" style="display:none; padding:4px 8px; font-size:12px;" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <main>
    <!-- Hero Section -->
    <section class="hero">
      <div class="container">
        <h1>Smart Prices. Always the Best Deal.</h1>
        <p>AI-powered pricing updated in real time based on demand.</p>
        <a href="products.html" class="btn btn-primary">Shop Electronics</a>
      </div>
    </section>

    <!-- Category Strip -->
    <section class="category-section container">
      <div class="category-strip">
        <a href="products.html?category=Mobile Phones" class="category-pill">📱 Mobile Phones</a>
        <a href="products.html?category=Laptops" class="category-pill">💻 Laptops</a>
        <a href="products.html?category=TVs" class="category-pill">📺 TVs</a>
        <a href="products.html?category=Earphones" class="category-pill">🎧 Earphones</a>
        <a href="products.html?category=Smartwatches" class="category-pill">⌚ Smartwatches</a>
        <a href="products.html?category=Cameras" class="category-pill">📷 Cameras</a>
      </div>
    </section>

    <!-- Trending Now -->
    <section class="container" style="margin-bottom: 40px;">
      <div class="section-header">
        <h2 class="section-title">Trending Now 🔥</h2>
        <a href="products.html" class="text-primary fw-medium text-sm">View All →</a>
      </div>
      <div id="trending-grid" class="product-grid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
          <span class="spinner spinner-large"></span>
        </div>
      </div>
    </section>

    <!-- Festive Deals -->
    <section id="festive-section" class="container" style="display: none; margin-bottom: 60px;">
      <div class="section-header">
        <h2 class="section-title">Festive Deals ✨</h2>
      </div>
      <div id="festive-grid" class="product-grid">
        <!-- populated dynamically -->
      </div>
    </section>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Navbar auth state
    if (isLoggedIn()) {
      document.getElementById('nav-logout-btn').style.display = 'inline-flex';
    } else {
      document.getElementById('nav-user-btn').href = 'login.html';
    }

    // Common card renderer function
    function createProductCardHTML(product) {
      // Handle missing image
      const imageUrl = product.image_url || 'https://placehold.co/400x400/F5F6F8/9CA3AF?text=No+Image';
      
      // Calculate star rating UI
      const rating = product.rating || 0;
      const reviews = product.review_count || 0;
      
      // badges
      let badgeHtml = '';
      if (product.season === 'Festive') {
        badgeHtml = `<div class="badge badge-warning" style="position:absolute; top:12px; left:12px; z-index:2;">✨ Festive</div>`;
      } else {
        const tierClass = product.segment === 'Premium' ? 'badge-primary' : (product.segment === 'Budget' ? 'badge-success' : 'badge-info');
        badgeHtml = `<div class="badge ${tierClass}" style="position:absolute; top:12px; left:12px; z-index:2;">${product.segment}</div>`;
      }

      // Add to cart function string (assuming cart array or backend call)
      const addToCartFn = `addToCart(${product.id})`;

      return `
        <div class="card card-hover product-card">
          ${badgeHtml}
          <div class="image-area">
            <a href="product-detail.html?id=${product.id}"><img src="${imageUrl}" alt="${product.name}" loading="lazy"></a>
            <button class="btn-icon wishlist-btn-pos" title="Save to wishlist">♡</button>
          </div>
          
          <div class="price-row">
            <span class="price">₹${product.current_price.toLocaleString()}</span>
            ${product.original_price > product.current_price ? `<span class="old-price">₹${product.original_price.toLocaleString()}</span>` : ''}
          </div>
          
          <div class="rating-row">
            ★ ${rating.toFixed(1)} <span class="text-muted" style="font-weight:400; margin-left:4px;">(${reviews})</span>
          </div>
          
          <a href="product-detail.html?id=${product.id}">
            <h3 class="product-name">${product.name}</h3>
          </a>
          
          <div class="card-actions">
            <button class="btn btn-primary" onclick="${addToCartFn}">🛒 Add to cart</button>
          </div>
        </div>
      `;
    }

    async function loadHomePageProducts() {
      // We need to fetch all products to sort out trending and festive
      // Since API doesn't specify sorting via GET by default based on spec (only said fetch GET /products), we'll do client-side sorting for Trending.
      
      const res = await apiGetProducts();
      
      if (!res.success) {
        document.getElementById('trending-grid').innerHTML = '<p class="text-danger">Failed to load products. Backend might be down.</p>';
        return;
      }

      let allProducts = res.data;
      if (typeof allProducts === 'object' && allProducts.data) {
          allProducts = allProducts.data; // Handle pagination wrapper if exists
      }
      
      if (!Array.isArray(allProducts)) {
        allProducts = [];
      }

      // Trending: Top 8 by demand_multiplier or rating or just first 8
      // Let's sort by demand_multiplier descending if exists, else fallback to something else
      const trending = [...allProducts].sort((a, b) => (b.demand_multiplier || 0) - (a.demand_multiplier || 0)).slice(0, 8);
      
      const trendingGrid = document.getElementById('trending-grid');
      trendingGrid.innerHTML = '';
      trending.forEach(p => {
        trendingGrid.innerHTML += createProductCardHTML(p);
      });

      // Festive
      const festive = allProducts.filter(p => p.season === 'Festive').slice(0, 4);
      if (festive.length > 0) {
        document.getElementById('festive-section').style.display = 'block';
        const festiveGrid = document.getElementById('festive-grid');
        festive.forEach(p => {
          festiveGrid.innerHTML += createProductCardHTML(p);
        });
      }
    }

    // Mini Toast API
    function showToast(message, type = 'success') {
      const id = Date.now();
      const container = document.getElementById('toast-container');
      const html = `<div id="toast-${id}" class="toast toast-${type}">${message}</div>`;
      container.insertAdjacentHTML('beforeend', html);
      
      setTimeout(() => {
        const t = document.getElementById(`toast-${id}`);
        if(t) {
          t.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => t.remove(), 300);
        }
      }, 3000);
    }

    // Add to cart placeholder for index (since it lacks full cart.js linkage here)
    window.addToCart = async function(id) {
      if (!isLoggedIn()) {
        showToast('Please login to add to cart', 'error');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        return;
      }
      
      const res = await apiAddToCart(id, 1);
      if (res.success) {
        showToast('Added to cart successfully!');
        // Update cart badge if backend returns new cart or just fake increment
        const badge = document.getElementById('cart-badge-count');
        badge.innerText = parseInt(badge.innerText) + 1;
      } else {
        showToast(res.error, 'error');
      }
    }

    // Load cart count if logged in
    async function loadCartCount() {
      if (isLoggedIn()) {
        const res = await apiGetCart();
        if (res.success && res.data && res.data.items) {
           const count = res.data.items.reduce((acc, item) => acc + item.quantity, 0);
           document.getElementById('cart-badge-count').innerText = count;
        }
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      loadHomePageProducts();
      loadCartCount();
    });
  </script>
</body>
</html>
